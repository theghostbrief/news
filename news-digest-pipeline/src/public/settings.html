<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings · News Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f3ef;
      color: #2d2a26;
      padding: 24px;
      min-height: 100vh;
      font-size: 15px;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 12px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #2d2a26;
    }
    .subtitle {
      color: #8a8580;
      font-size: 15px;
      margin-bottom: 22px;
    }

    /* Buttons */
    .btn {
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .btn-ghost {
      background: transparent;
      color: #8a8580;
      border: 1px solid #ddd8d0;
    }
    .btn-ghost:hover {
      border-color: #7c3aed;
      color: #7c3aed;
      box-shadow: 0 0 10px rgba(124,58,237,0.1);
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: #fff;
      border: none;
    }
    .btn-primary:hover {
      box-shadow: 0 0 16px rgba(124,58,237,0.3);
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* Left nav */
    .nav {
      background: #ffffff;
      border: 1px solid #e8e4df;
      border-radius: 14px;
      padding: 8px;
      position: sticky;
      top: 24px;
    }
    .nav-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: #6b6660;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .nav-item:hover { background: #faf9f7; color: #2d2a26; }
    .nav-item.active {
      background: rgba(124,58,237,0.08);
      color: #7c3aed;
      font-weight: 600;
    }

    /* Content panel */
    .panel { min-width: 0; }
    .card {
      background: #ffffff;
      border: 1px solid #e8e4df;
      border-radius: 14px;
      padding: 24px;
      display: none;
    }
    .card.active { display: block; }
    .card h2 {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }
    .card .card-desc {
      color: #8a8580;
      font-size: 13.5px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #6b6660;
      margin-bottom: 6px;
    }
    .field .hint {
      font-size: 12px;
      color: #b0aaa4;
      margin-top: 5px;
      line-height: 1.5;
    }

    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd8d0;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #2d2a26;
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select { cursor: pointer; appearance: auto; }
    input:focus, textarea:focus, select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124,58,237,0.12);
    }
    input[readonly], textarea[readonly] {
      background: #f7f5f2;
      color: #8a8580;
      cursor: default;
    }
    textarea {
      min-height: 320px;
      resize: vertical;
      line-height: 1.6;
      font-size: 13.5px;
    }
    textarea.mono {
      font-family: 'Inter', ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Secret rows */
    .secret-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 14px;
      border: 1px solid #e8e4df;
      border-radius: 9px;
      margin-bottom: 8px;
      background: #faf9f7;
    }
    .secret-label { font-size: 13.5px; font-weight: 500; color: #2d2a26; }
    .secret-meta { display: flex; align-items: center; gap: 10px; }
    .secret-hint {
      font-size: 13px;
      color: #8a8580;
      font-variant-numeric: tabular-nums;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }
    .badge.on {
      background: rgba(34,197,94,0.1);
      color: #16a34a;
      border: 1px solid rgba(34,197,94,0.25);
    }
    .badge.off {
      background: rgba(245,158,11,0.08);
      color: #d97706;
      border: 1px solid rgba(245,158,11,0.25);
    }
    .badge.planned {
      background: rgba(120,113,108,0.1);
      color: #78716c;
      border: 1px solid rgba(120,113,108,0.28);
    }
    .status-note {
      font-size: 12px;
      color: #8a8580;
      margin: -2px 0 12px;
      line-height: 1.5;
    }
    .group-subtitle {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8a8580;
      margin: 18px 0 10px;
    }
    .group-subtitle:first-of-type { margin-top: 0; }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 14px;
      padding: 14px;
      background: #faf9f7;
      border: 1px solid #e8e4df;
      border-radius: 10px;
    }
    .preview-grid .pv {
      font-size: 13px;
      line-height: 1.5;
      color: #6b6660;
    }
    .preview-grid .pv b { color: #2d2a26; font-weight: 600; }

    /* Save bar */
    .save-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid #e8e4df;
    }
    .status {
      font-size: 13.5px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .status.show { opacity: 1; }
    .status.ok { color: #16a34a; }
    .status.err { color: #ef4444; }

    .purpose {
      font-size: 12.5px;
      color: #8a8580;
      line-height: 1.6;
      margin-bottom: 12px;
      padding: 10px 12px;
      background: #faf9f7;
      border: 1px solid #e8e4df;
      border-radius: 9px;
    }
    .purpose b { color: #6b6660; font-weight: 600; }

    /* Scenario cards */
    .scenario-card {
      display: block;
      width: 100%;
      text-align: left;
      border: 1px solid #ddd8d0;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 12px;
      background: #ffffff;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .scenario-card:hover { border-color: #b8a4e8; }
    .scenario-card.selected {
      border-color: #7c3aed;
      background: rgba(124,58,237,0.04);
      box-shadow: 0 0 0 2px rgba(124,58,237,0.12);
    }
    .scenario-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .scenario-radio {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #ddd8d0;
      flex: 0 0 auto;
      position: relative;
      transition: border-color 0.15s;
    }
    .scenario-card.selected .scenario-radio { border-color: #7c3aed; }
    .scenario-card.selected .scenario-radio::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #7c3aed;
    }
    .scenario-name { font-size: 15px; font-weight: 600; color: #2d2a26; }
    .scenario-subtitle { font-size: 12px; color: #8a8580; }
    .badge.serious {
      background: rgba(124,58,237,0.1);
      color: #7c3aed;
      border: 1px solid rgba(124,58,237,0.25);
    }
    .badge.current {
      background: rgba(59,130,246,0.08);
      color: #2563eb;
      border: 1px solid rgba(59,130,246,0.22);
    }
    .scenario-desc {
      font-size: 13px;
      color: #6b6660;
      line-height: 1.6;
      margin-left: 26px;
    }

    /* Prompt editor blocks inside Scenarios */
    .prompt-block {
      border: 1px solid #e8e4df;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 14px;
      background: #fcfbf9;
    }
    .prompt-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .prompt-title { font-size: 14px; font-weight: 600; color: #2d2a26; }
    .prompt-block textarea { min-height: 240px; }
    .prompt-block .save-bar { margin-top: 14px; padding-top: 14px; }

    .help-block { margin-bottom: 18px; }
    .help-block h3 {
      font-size: 14px;
      font-weight: 600;
      color: #2d2a26;
      margin-bottom: 4px;
    }
    .help-block p {
      font-size: 13.5px;
      color: #6b6660;
      line-height: 1.6;
    }
    .help-note {
      margin-top: 8px;
      padding: 12px 14px;
      background: rgba(124,58,237,0.05);
      border: 1px solid rgba(124,58,237,0.12);
      border-radius: 10px;
      font-size: 13px;
      color: #6b6660;
      line-height: 1.6;
    }
    .loading { padding: 40px; text-align: center; color: #b0aaa4; }

    /* Auth bar (read-only notice + login) */
    .auth-bar {
      display: none;
      align-items: center;
      gap: 12px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.28);
      color: #b45309;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    body.readonly .auth-bar, body.authed .auth-bar { display: flex; }
    /* Authorized state: green bar, hide the read-only notice + login CTA */
    .auth-ok, .auth-bar .btn-logout { display: none; }
    body.authed .auth-bar {
      background: rgba(16,185,129,0.10);
      border-color: rgba(16,185,129,0.30);
      color: #047857;
    }
    body.authed .auth-ro, body.authed .btn-login { display: none; }
    body.authed .auth-ok { display: inline; }
    body.authed .auth-bar .btn-logout { display: inline-block; }
    .auth-bar .btn-login, .auth-bar .btn-logout {
      margin-left: auto;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: #fff; border: none; border-radius: 8px;
      padding: 6px 16px; font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all 0.2s ease; text-decoration: none;
      white-space: nowrap; flex-shrink: 0;
    }
    .auth-bar .btn-logout { background: linear-gradient(135deg, #64748b, #475569); }
    .auth-bar .btn-login:hover, .auth-bar .btn-logout:hover { box-shadow: 0 0 16px rgba(124,58,237,0.3); transform: translateY(-1px); }
    /* Read-only: hide all Save / activate controls for anonymous visitors */
    body.readonly .save-bar { display: none !important; }
    /* Anonymous: scenarios are not switchable, and technical content is not
       selectable/copyable (prompts/config are also redacted server-side). */
    body.readonly .scenario-card { pointer-events: none; cursor: default; opacity: 0.9; }
    body.readonly .panel { user-select: none; -webkit-user-select: none; }
    .lock-notice {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 18px 16px;
      background: #f7f5f2;
      border: 1px dashed #ddd8d0;
      border-radius: 10px;
      color: #8a8580;
      font-size: 13.5px;
      line-height: 1.5;
      user-select: none;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f5f3ef; }
    ::-webkit-scrollbar-thumb { background: #ddd8d0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b0aaa4; }

    @media (max-width: 768px) {
      body { padding: 14px; }
      h1 { font-size: 24px; }
      .layout { grid-template-columns: 1fr; }
      .nav {
        position: static;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .nav-item { width: auto; flex: 1 1 auto; text-align: center; }
      .row2 { grid-template-columns: 1fr; }
      .card { padding: 18px; }
    }

    /* Tab bar (shared across Digests / Publishing / Settings) */
    .tabs {
      display: flex;
      gap: 2px;
      margin: 4px 0 22px;
      border-bottom: 1px solid #e8e4df;
      flex-wrap: wrap;
    }
    .tabs .tab {
      padding: 9px 18px;
      font-size: 15px;
      font-weight: 500;
      color: #8a8580;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .2s ease, border-color .2s ease;
      white-space: nowrap;
    }
    .tabs .tab:hover { color: #2d2a26; }
    .tabs .tab.active {
      color: #7c3aed;
      border-bottom-color: #7c3aed;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Settings</h1>
    </div>
    <p class="subtitle" id="subtitle">Pipeline and prompt configuration</p>
    <nav class="tabs">
      <a class="tab" href="index.html">Digests</a>
      <a class="tab" href="articles.html">Articles</a>
      <a class="tab" href="syndication.html">Publishing</a>
      <a class="tab active" href="settings.html">Settings</a>
      <a class="tab" href="moderation.html">Moderation</a>
    </nav>

    <div class="auth-bar" id="authbar">
      <span class="auth-ro">👁 Read-only mode — you are not signed in. You can view, but not change anything.</span>
      <span class="auth-ok">✅ You are signed in — changes are enabled.</span>
      <a class="btn-login" href="#" id="btn-login">Sign in</a>
      <a class="btn-logout" href="#" id="btn-logout">Sign out</a>
    </div>

    <div id="loading" class="loading">Loading settings…</div>

    <div class="layout" id="layout" style="display:none">
      <nav class="nav" id="nav"></nav>
      <div class="panel" id="panel"></div>
    </div>
  </div>

  <script>
    const GROUPS = [
      { id: 'general',    title: 'General' },
      { id: 'queue',      title: 'Queue & generation' },
      { id: 'scenarios',  title: 'Scenarios' },
      { id: 'content',    title: 'Content' },
      { id: 'publishing', title: 'Publishing' },
      { id: 'help',       title: 'Help' },
    ];

    let DATA = null;
    let active = 'general';
    let selectedScenario = null;
    let READONLY = false;

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function load() {
      const res = await fetch('/api/settings');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      DATA = await res.json();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('layout').style.display = 'grid';
      renderNav();
      renderPanel();
    }

    function renderNav() {
      document.getElementById('nav').innerHTML = GROUPS.map((g) =>
        `<button class="nav-item ${g.id === active ? 'active' : ''}" data-id="${g.id}">${g.title}</button>`
      ).join('');
      document.querySelectorAll('.nav-item').forEach((el) => {
        el.onclick = () => { active = el.dataset.id; renderNav(); renderPanel(); };
      });
    }

    function textareaCard(id, title, desc, value, purpose) {
      const purposeHtml = purpose
        ? `<div class="purpose"><b>Purpose:</b> ${esc(purpose)}</div>`
        : '';
      return `
        <div class="card active">
          <h2>${title}</h2>
          <p class="card-desc">${desc}</p>
          ${purposeHtml}
          <div class="field">
            <textarea class="mono" id="ta-${id}">${esc(value)}</textarea>
          </div>
          ${saveBar(id)}
        </div>`;
    }

    function saveBar(id) {
      return `
        <div class="save-bar">
          <button class="btn btn-primary" id="save-${id}">Save</button>
          <span class="status" id="status-${id}"></span>
        </div>`;
    }

    function lockNotice() {
      return '<div class="lock-notice">🔒 Content is available only after signing in. Sign in to view and edit.</div>';
    }

    function promptBlock(id, title, value, purpose, usedNow) {
      const used = usedNow ? '<span class="badge on">in use now</span>' : '';
      const purposeHtml = purpose
        ? `<div class="purpose"><b>Purpose:</b> ${esc(purpose)}</div>`
        : '';
      const body = READONLY
        ? lockNotice()
        : `<textarea class="mono" id="ta-${id}">${esc(value)}</textarea>`;
      return `
        <div class="prompt-block">
          <div class="prompt-head"><span class="prompt-title">${esc(title)}</span>${used}</div>
          ${purposeHtml}
          ${body}
          ${saveBar(id)}
        </div>`;
    }

    function secretRow(label, masked) {
      const on = masked && masked.configured;
      return `
        <div class="secret-row">
          <span class="secret-label">${label}</span>
          <span class="secret-meta">
            <span class="secret-hint">${on ? esc(masked.hint) : '—'}</span>
            <span class="badge ${on ? 'on' : 'off'}">${on ? 'configured' : 'not configured'}</span>
          </span>
        </div>`;
    }

    function plannedRow(label, masked, statusText) {
      const on = masked && masked.configured;
      return `
        <div class="secret-row">
          <span class="secret-label">${esc(label)}</span>
          <span class="secret-meta">
            <span class="secret-hint">${on ? esc(masked.hint) : '—'}</span>
            <span class="badge planned">coming soon</span>
          </span>
        </div>
        <div class="status-note">${esc(statusText || '')}</div>`;
    }

    // Enabled pro features, populated from /api/features before load() renders.
    // In the public/open-core build this stays empty, so the paid distribution
    // roadmap ("Planned integrations") is not shown.
    let PRO_FEATURES = [];

    function plannedSection(planned) {
      if (!planned || !PRO_FEATURES.includes('distribution')) return '';
      let out = '<div class="group-subtitle">Planned integrations</div>';
      out += '<div class="status-note">Pipelines will be added later. Currently only status and secret presence in .env are shown.</div>';
      if (planned.instagram) {
        out += plannedRow('Instagram · Access Token', planned.instagram.accessToken, planned.instagram.status);
        out += plannedRow('Instagram · Account ID', planned.instagram.accountId, '');
      }
      if (planned.tiktok) {
        out += plannedRow('TikTok · Access Token', planned.tiktok.accessToken, planned.tiktok.status);
      }
      if (planned.youtube) {
        out += plannedRow('YouTube · Access Token', planned.youtube.accessToken, planned.youtube.status);
        out += plannedRow('YouTube · Channel ID', planned.youtube.channelId, '');
      }
      if (planned.gemini) {
        out += plannedRow('Google Gemini · API Key', planned.gemini.apiKey, planned.gemini.status);
      }
      return out;
    }

    function renderPanel() {
      const panel = document.getElementById('panel');
      const d = DATA;
      let html = '';

      if (active === 'general') {
        const g = d.general;
        const catalog = g.modelCatalog || { anthropic: [], openai: [] };
        const vendor = (g.llmVendor && g.llmVendor.value) || 'anthropic';
        const currentModel = (g.model && g.model.value) || (g.claudeModel && g.claudeModel.value) || '';
        const vendorOpts = ['anthropic', 'openai'].map((v) =>
          `<option value="${v}" ${v === vendor ? 'selected' : ''}>${v === 'anthropic' ? 'Anthropic' : 'OpenAI'}</option>`
        ).join('');
        const modelList = catalog[vendor] || [];
        const inList = modelList.some((m) => m.id === currentModel);
        const priceHint = (m) => m.pricing
          ? ` — $${m.pricing.input}/$${m.pricing.output} per 1M`
          : '';
        const modelOpts = modelList.map((m) =>
          `<option value="${esc(m.id)}" ${m.id === currentModel ? 'selected' : ''}>${esc(m.label)}${esc(priceHint(m))}</option>`
        ).join('') +
          `<option value="__custom__" ${!inList ? 'selected' : ''}>Other (enter manually)…</option>`;
        const customDisplay = inList ? 'none' : 'block';

        // OpenAI reasoning effort — vendor-conditional (only meaningful for OpenAI).
        const reasoning = (g.openaiReasoningEffort && g.openaiReasoningEffort.value) || '';
        const reasoningSuggestions = (g.openaiReasoningEffort && g.openaiReasoningEffort.suggestions)
          || ['minimal', 'low', 'medium', 'high'];
        const reasoningInList = reasoningSuggestions.includes(reasoning);
        const reasoningOpts =
          `<option value="">— not set (default) —</option>` +
          reasoningSuggestions.map((r) =>
            `<option value="${esc(r)}" ${r === reasoning ? 'selected' : ''}>${esc(r)}</option>`
          ).join('') +
          (reasoning && !reasoningInList
            ? `<option value="${esc(reasoning)}" selected>${esc(reasoning)} (from .env)</option>`
            : '');
        const reasoningDisplay = vendor === 'openai' ? 'block' : 'none';
        html = `
          <div class="card active">
            <h2>General</h2>
            <p class="card-desc">Base application settings. Vendor and model are used for generating commentary and assembling the digest.</p>
            <div class="field">
              <label>Vendor — LLM provider</label>
              <select id="f-llmVendor">${vendorOpts}</select>
              <div class="hint">Stored in LLM_VENDOR. Determines which API requests go to: Anthropic or OpenAI.</div>
            </div>
            <div class="field">
              <label>Model</label>
              <select id="f-model">${modelOpts}</select>
              <input type="text" id="f-modelCustom" style="margin-top:8px;display:${customDisplay}" placeholder="Enter a model id manually" value="${inList ? '' : esc(currentModel)}">
              <div class="hint">The list is a suggestion, not exhaustive. You can enter any id via "Other". Applies to the selected vendor; stored in CLAUDE_MODEL (historical variable name).</div>
            </div>
            <div class="field" id="field-reasoning" style="display:${reasoningDisplay}">
              <label>Reasoning effort — OpenAI only</label>
              <select id="f-openaiReasoningEffort">${reasoningOpts}</select>
              <div class="hint">Model reasoning depth (OPENAI_REASONING_EFFORT). "Not set" = as now, the parameter isn't sent. The list is a suggestion; OpenAI recommends starting with medium and raising it only if quality is lacking.</div>
            </div>
            <div class="field">
              <label>Anthropic endpoint (ANTHROPIC_BASE_URL)</label>
              <input type="text" id="f-anthropicBaseUrl" placeholder="${esc((g.anthropicBaseUrl && g.anthropicBaseUrl.placeholder) || 'https://api.anthropic.com')}" value="${esc((g.anthropicBaseUrl && g.anthropicBaseUrl.value) || '')}">
              <div class="hint">Leave empty for the default value.</div>
            </div>
            <div class="field">
              <label>OpenAI endpoint (OPENAI_BASE_URL)</label>
              <input type="text" id="f-openaiBaseUrl" placeholder="${esc((g.openaiBaseUrl && g.openaiBaseUrl.placeholder) || 'https://api.openai.com/v1')}" value="${esc((g.openaiBaseUrl && g.openaiBaseUrl.value) || '')}">
              <div class="hint">Leave empty for the default value.</div>
            </div>
            <div class="field">
              <label>Environment (NODE_ENV)</label>
              <input type="text" value="${esc(g.nodeEnv.value)}" readonly>
            </div>
            <div class="field">
              <label>Base URL</label>
              <input type="text" value="${esc(g.baseUrl.value)}" readonly>
            </div>
            <div class="field">
              <label>DB path (DB_PATH)</label>
              <input type="text" value="${esc(g.dbPath.value)}" readonly>
            </div>
            <div class="field">
              <label>Notification topic (NTFY_TOPIC)</label>
              <input type="text" value="${esc((g.ntfyTopic && g.ntfyTopic.value) || '')}" readonly>
              <div class="hint">The ntfy channel for service notifications. Changed only in .env.</div>
            </div>
            <div class="hint">API keys are set in the "Publishing" section / in the .env file.</div>
            ${saveBar('general')}
          </div>`;
      } else if (active === 'queue') {
        const q = d.queue;
        html = `
          <div class="card active">
            <h2>Queue & generation</h2>
            <p class="card-desc">Once enough articles have accumulated in the queue, the pipeline automatically assembles a digest.</p>
            <div class="row2">
              <div class="field">
                <label>Article threshold (ARTICLE_THRESHOLD)</label>
                <input type="number" id="f-articleThreshold" min="1" max="100" value="${esc(q.articleThreshold.value)}">
                <div class="hint">How many new articles trigger generation (1–100)</div>
              </div>
              <div class="field">
                <label>Max articles per digest (MAX_ARTICLES_PER_DIGEST)</label>
                <input type="number" id="f-maxArticlesPerDigest" min="1" max="100" value="${esc(q.maxArticlesPerDigest.value)}">
                <div class="hint">Upper limit of articles per digest (1–100)</div>
              </div>
            </div>
            <div class="field">
              <label>Queue check interval, ms (CHECK_INTERVAL_MS)</label>
              <input type="number" id="f-checkIntervalMs" min="5000" max="3600000" step="1000" value="${esc(q.checkIntervalMs.value)}">
              <div class="hint">${esc(q.checkIntervalMs.note || '')} (5000–3600000)</div>
            </div>
            ${saveBar('queue')}
          </div>`;
      } else if (active === 'content') {
        const c = d.content;
        const p = c.parsed || {};
        const contentBody = READONLY
          ? lockNotice()
          : `
            <div class="field">
              <textarea class="mono" id="ta-content">${esc(c.text)}</textarea>
            </div>
            <div class="group-subtitle">Parsed values (reference only)</div>
            <div class="preview-grid">
              <div class="pv"><b>Hashtag:</b> ${esc(p.hashtag)}</div>
              <div class="pv"><b>Course mention:</b> ${esc(p.courseMention)}</div>
              <div class="pv"><b>Boundary/disclaimer:</b> ${esc(p.boundaryIntent)}</div>
              <div class="pv"><b>Trailing hashtags:</b> ${esc(p.hashtagsSuffix)}</div>
            </div>`;
        html = `
          <div class="card active">
            <h2>Content</h2>
            <p class="card-desc">Digest formatting settings: hashtags, course mention, boundary/disclaimer (config.md).</p>
            ${contentBody}
            ${saveBar('content')}
          </div>`;
      } else if (active === 'publishing') {
        const pub = d.publishing;
        html = `
          <div class="card active">
            <h2>Publishing</h2>
            <p class="card-desc">Integration secrets and tokens. For security, these are only edited in the <code>.env</code> file, not through this interface.</p>
            <div class="group-subtitle">Telegram</div>
            ${secretRow('Bot Token', pub.telegram.botToken)}
            ${secretRow('Chat ID', pub.telegram.chatId)}
            ${secretRow('Publish Chat ID', pub.telegram.publishChatId)}
            ${secretRow('Webhook Secret', pub.telegram.webhookSecret)}
            <div class="group-subtitle">Facebook</div>
            <div class="status-note"><span class="badge on">Page only</span> The legal path. Posting to a personal profile is not supported.</div>
            ${secretRow('Page ID', pub.facebook.pageId)}
            ${secretRow('Page Access Token', pub.facebook.pageAccessToken)}
            <div class="group-subtitle">API Keys</div>
            ${secretRow('Anthropic API Key', pub.anthropicApiKey)}
            ${secretRow('OpenAI API Key', pub.openaiApiKey)}
            ${secretRow('Fal Key', pub.falKey)}
            ${plannedSection(pub.planned)}
          </div>`;
      } else if (active === 'scenarios') {
        const sc = d.scenarios;
        if (selectedScenario === null) selectedScenario = sc.active;
        const cards = sc.options.map((o) => {
          const isSel = o.id === selectedScenario;
          const isActive = o.id === sc.active;
          const badge = o.id === 'architect'
            ? `<span class="badge serious">power mode</span>`
            : `<span class="badge current">current</span>`;
          const activeMark = isActive ? `<span class="badge on">active</span>` : '';
          return `
            <button class="scenario-card ${isSel ? 'selected' : ''}" data-scenario="${esc(o.id)}">
              <div class="scenario-head">
                <span class="scenario-radio"></span>
                <span class="scenario-name">${esc(o.name)}</span>
                ${badge}
                ${activeMark}
                <span class="scenario-subtitle">${esc(o.subtitle)}</span>
              </div>
              <div class="scenario-desc">${esc(o.description)}</div>
            </button>`;
        }).join('');
        const isActiveSel = selectedScenario === sc.active;
        const selOpt = sc.options.find((o) => o.id === selectedScenario) || {};
        let scenarioPrompt = '';
        let assemblySection = '';
        if (selectedScenario === 'sarcastic') {
          scenarioPrompt = promptBlock('commentary', 'Commentary style → prompt.md', d.commentary.text,
            'Phase A system prompt for the "Sarcasm" scenario: sarcastic, informal authorial tone and rewriting rules.',
            isActiveSel);
          assemblySection = `<div class="group-subtitle">Shared stage · applies to Sarcasm & Architect</div>` +
            promptBlock('assembly', 'Digest assembly → assembly_prompt.md', d.assembly.text,
              'Phase B system prompt: mechanically assembles the finished commentary into the final digest (numbering, course mention, boundary, hashtags). Shared by the Sarcasm and Architect scenarios.',
              false);
        } else if (selectedScenario === 'architect') {
          scenarioPrompt = promptBlock('deep', 'Deep prompt → prompt_deep.md', d.deep.text,
            'Phase A system prompt for the "Architect" scenario: cold techno-philosophical analysis, the "pulling-back camera" method.',
            isActiveSel);
          assemblySection = `<div class="group-subtitle">Shared stage · applies to Sarcasm & Architect</div>` +
            promptBlock('assembly', 'Digest assembly → assembly_prompt.md', d.assembly.text,
              'Phase B system prompt: mechanically assembles the finished commentary into the final digest (numbering, course mention, boundary, hashtags). Shared by the Sarcasm and Architect scenarios.',
              false);
        } else if (selectedScenario === 'ghost') {
          scenarioPrompt = promptBlock('ghost', 'Ghost persona → prompts/en/prompt.md', d.ghost.text,
            'Phase A system prompt for the English "Ghost Brief" edition: dry, skeptical defense-analyst voice, OSINT confidence markers, sober register for casualties.',
            isActiveSel);
          assemblySection = `<div class="group-subtitle">Ghost Brief assembly → prompts/en/assembly_prompt.md</div>` +
            promptBlock('ghostAssembly', 'Digest assembly (English edition)', d.ghostAssembly.text,
              'Phase B system prompt for the Ghost Brief edition: emits the SEG/TOP3 machine-readable markers and inserts the English footer + hashtags. Independent from Krol\'s Russian assembly prompt above.',
              false);
        }
        const inactiveNote = isActiveSel
          ? ''
          : `<div class="help-note">Scenario "${esc(selOpt.name || selectedScenario)}" is selected but not yet active. Click <b>"Activate"</b> so the pipeline starts using its prompt.</div>`;
        html = `
          <div class="card active">
            <h2>Scenarios</h2>
            <p class="card-desc">Choose a scenario — only its stages and prompts are shown below. The Ghost Brief (English) edition has its own independent assembly prompt.</p>

            <div class="group-subtitle">Scenario selection</div>
            ${cards}
            <div class="save-bar">
              <button class="btn btn-primary" id="save-scenarios">Activate</button>
              <span class="status" id="status-scenarios"></span>
            </div>

            <div class="group-subtitle">Scenario prompt "${esc(selOpt.name || selectedScenario)}"</div>
            ${inactiveNote}
            ${scenarioPrompt}

            ${assemblySection}
          </div>`;
      } else if (active === 'help') {
        html = `
          <div class="card active">
            <h2>Help</h2>
            <p class="card-desc">What affects what.</p>
            <div class="help-block"><h3>General</h3><p>The Claude model setting determines which model version is used both for generating commentary and for assembling the digest.</p></div>
            <div class="help-block"><h3>Queue & generation</h3><p>Article threshold — how many new articles must accumulate to automatically trigger generation. Max articles — the upper limit per digest. Interval — how often the pipeline checks the queue.</p></div>
            <div class="help-block"><h3>Scenarios</h3><p>A scenario sets the Phase A system prompt (authorial commentary on an article). Mutually exclusive: "Sarcasm" (prompt.md) and "Architect" (prompt_deep.md) — exactly one is active. Shared by both is "Digest assembly" (assembly_prompt.md, Phase B): numbering, course mention, boundary, and hashtags. All three prompts are edited right in this section; the "Activate" button switches the active scenario.</p></div>
            <div class="help-block"><h3>Content</h3><p>Digest formatting: the main hashtag, course-mention text, boundary/disclaimer, and trailing hashtags (config.md). Applies in any scenario.</p></div>
            <div class="help-block"><h3>Publishing</h3><p>Telegram and Facebook tokens and API keys. Control where and under whose name digests get published.</p></div>
            <div class="help-note">
              <b>Important.</b> Secrets (tokens, keys) are edited only in the <code>.env</code> file on the server — this interface does not change them.
              The <b>Queue check interval</b> setting only takes effect after a server restart; other values apply immediately after saving.
            </div>
          </div>`;
      }

      panel.innerHTML = html;
      bindSaves();
      if (active === 'scenarios') bindScenarioCards();
      if (active === 'general') bindGeneralControls();
      applyReadonly();
    }

    // Read-only: disable every editable control in the panel (save bars are
    // hidden via CSS). Navigation and scenario preview stay clickable.
    function applyReadonly() {
      if (!READONLY) return;
      document.querySelectorAll('#panel select').forEach((el) => el.setAttribute('disabled', 'disabled'));
      document.querySelectorAll('#panel input, #panel textarea').forEach((el) => el.setAttribute('readonly', 'readonly'));
    }

    function bindGeneralControls() {
      const vendorSel = document.getElementById('f-llmVendor');
      const modelSel = document.getElementById('f-model');
      const customInp = document.getElementById('f-modelCustom');
      if (!vendorSel || !modelSel || !customInp) return;

      const catalog = (DATA.general && DATA.general.modelCatalog) || { anthropic: [], openai: [] };

      const refreshCustomVisibility = () => {
        customInp.style.display = modelSel.value === '__custom__' ? 'block' : 'none';
      };

      vendorSel.onchange = () => {
        const list = catalog[vendorSel.value] || [];
        const priceHint = (m) => m.pricing ? ` — $${m.pricing.input}/$${m.pricing.output} per 1M` : '';
        const opts = list.map((m) => `<option value="${esc(m.id)}">${esc(m.label)}${esc(priceHint(m))}</option>`).join('') +
          '<option value="__custom__">Other (enter manually)…</option>';
        modelSel.innerHTML = opts;
        // Reset selection to first model of the new vendor.
        modelSel.value = list.length ? list[0].id : '__custom__';
        customInp.value = '';
        refreshCustomVisibility();
        // Reasoning effort is OpenAI-only — show/hide with the vendor.
        const reasoningField = document.getElementById('field-reasoning');
        if (reasoningField) reasoningField.style.display = vendorSel.value === 'openai' ? 'block' : 'none';
      };

      modelSel.onchange = refreshCustomVisibility;
    }

    function bindScenarioCards() {
      if (READONLY) return; // anonymous visitors cannot switch the active scenario
      document.querySelectorAll('.scenario-card').forEach((el) => {
        el.onclick = () => {
          if (selectedScenario === el.dataset.scenario) return;
          selectedScenario = el.dataset.scenario;
          renderPanel(); // re-render so only the selected scenario's stage/prompt shows
        };
      });
    }

    function bindSaves() {
      document.querySelectorAll('#panel [id^="save-"]').forEach((btn) => {
        const id = btn.id.slice(5); // strip "save-"
        btn.onclick = () => save(id, btn);
      });
    }

    function collectPatch(id) {
      if (id === 'general') {
        const modelSel = document.getElementById('f-model');
        const customInp = document.getElementById('f-modelCustom');
        const modelId = modelSel.value === '__custom__'
          ? (customInp.value || '').trim()
          : modelSel.value;
        const reasoningSel = document.getElementById('f-openaiReasoningEffort');
        return {
          llmVendor: document.getElementById('f-llmVendor').value,
          claudeModel: modelId,
          anthropicBaseUrl: document.getElementById('f-anthropicBaseUrl').value.trim(),
          openaiBaseUrl: document.getElementById('f-openaiBaseUrl').value.trim(),
          openaiReasoningEffort: reasoningSel ? reasoningSel.value : '',
        };
      }
      if (id === 'queue') {
        return {
          articleThreshold: parseInt(document.getElementById('f-articleThreshold').value, 10),
          maxArticlesPerDigest: parseInt(document.getElementById('f-maxArticlesPerDigest').value, 10),
          checkIntervalMs: parseInt(document.getElementById('f-checkIntervalMs').value, 10),
        };
      }
      if (id === 'commentary')     return { commentary:     { text: document.getElementById('ta-commentary').value } };
      if (id === 'assembly')       return { assembly:       { text: document.getElementById('ta-assembly').value } };
      if (id === 'deep')           return { deep:           { text: document.getElementById('ta-deep').value } };
      if (id === 'ghost')          return { ghost:          { text: document.getElementById('ta-ghost').value } };
      if (id === 'ghostAssembly')  return { ghostAssembly:  { text: document.getElementById('ta-ghostAssembly').value } };
      if (id === 'content')        return { content:        { text: document.getElementById('ta-content').value } };
      if (id === 'scenarios')      return { activeScenario: selectedScenario };
      return {};
    }

    function showStatus(id, ok, msg) {
      const el = document.getElementById('status-' + id);
      if (!el) return;
      el.textContent = msg;
      el.className = 'status show ' + (ok ? 'ok' : 'err');
      if (ok) setTimeout(() => { el.className = 'status'; }, 3000);
    }

    async function save(id, btn) {
      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/settings', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(collectPatch(id)),
        });
        const data = await res.json();
        if (!res.ok) {
          const detail = Array.isArray(data.details) ? data.details.join('; ') : (data.error || 'Error');
          throw new Error(detail);
        }
        DATA = data;
        showStatus(id, true, 'Saved ✓');
        renderPanel();
      } catch (err) {
        showStatus(id, false, 'Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = original;
      }
    }

    async function loadAuth() {
      let required = false, authed = false;
      try {
        const res = await fetch('/api/auth/status');
        const a = await res.json();
        required = !!a.required;
        authed = !!a.authenticated;
        READONLY = !!(a.required && !a.authenticated);
      } catch (err) {
        READONLY = false; // fail open for viewing; server still guards writes
      }
      document.body.classList.toggle('readonly', READONLY);
      document.body.classList.toggle('authed', required && authed);
    }

    document.getElementById('btn-login').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = '/api/auth/login?next=' + encodeURIComponent(location.pathname);
    });
    document.getElementById('btn-logout').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = '/api/auth/logout?next=' + encodeURIComponent(location.pathname);
    });

    // Discover enabled pro features (open-core / public build differ only here).
    // Populates PRO_FEATURES and hides the "Publishing" tab if absent. Must
    // resolve before load() renders, so plannedSection() sees PRO_FEATURES.
    const featuresReady = fetch('/api/features')
      .then((r) => (r.ok ? r.json() : { features: [] }))
      .then((d) => {
        PRO_FEATURES = d && Array.isArray(d.features) ? d.features : [];
        if (!PRO_FEATURES.includes('syndication')) {
          const tab = document.querySelector('.tabs a.tab[href="syndication.html"]');
          if (tab) tab.style.display = 'none';
        }
        if (!PRO_FEATURES.includes('moderation')) {
          const modTab = document.querySelector('.tabs a.tab[href="moderation.html"]');
          if (modTab) modTab.style.display = 'none';
        }
      })
      .catch(() => { PRO_FEATURES = []; });

    loadAuth().finally(() => {
      featuresReady.finally(() => {
        load().catch((err) => {
          document.getElementById('loading').textContent = 'Failed to load settings: ' + err.message;
        });
      });
    });
  </script>
</body>
</html>
